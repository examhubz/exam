<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHY 208 — Experimental Physics IV | Exam Bank</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card: #1c2128;
    --border: #30363d;
    --accent: #f0a500;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --tag-a: #1f6feb;
    --tag-b: #388bfd;
    --highlight: rgba(240,165,0,0.15);
    --radius: 8px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Lora', Georgia, serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #161b22 60%, #1a2030 100%);
    border-bottom: 1px solid var(--border);
    padding: 32px 24px 28px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 900px;
    margin: 0 auto;
  }

  .course-tag {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 20px;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    padding: 12px 48px 12px 44px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #searchInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240,165,0,0.12);
  }

  #clearBtn {
    display: none;
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }
  #clearBtn:hover { color: var(--text); }

  /* FILTERS */
  .filters {
    max-width: 900px;
    margin: 16px auto 0;
    padding: 0 24px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 4px;
  }

  .filter-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 5px 14px;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

  /* STATS BAR */
  .stats-bar {
    max-width: 900px;
    margin: 12px auto 0;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  #resultCount { color: var(--accent2); font-weight: 700; }

  /* MAIN */
  main {
    max-width: 900px;
    margin: 24px auto 0;
    padding: 0 24px;
  }

  /* SECTION HEADER */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0 16px;
  }

  .section-divider h2 {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .session-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    padding: 3px 8px;
    white-space: nowrap;
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    animation: slideIn 0.3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-card:hover { border-color: rgba(240,165,0,0.4); }

  .q-header {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 16px 18px;
    cursor: pointer;
    user-select: none;
  }

  .q-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(240,165,0,0.1);
    border: 1px solid rgba(240,165,0,0.25);
    border-radius: 4px;
    padding: 3px 8px;
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .q-text {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
    flex: 1;
  }

  .q-text mark {
    background: var(--highlight);
    color: var(--accent);
    border-radius: 2px;
    padding: 0 2px;
  }

  .q-toggle {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 14px;
    transition: all 0.2s;
    margin-top: 2px;
  }

  .q-card.open .q-toggle {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    transform: rotate(45deg);
  }

  /* OPTIONS */
  .q-options {
    display: none;
    padding: 0 18px 18px 18px;
    border-top: 1px solid var(--border);
    margin-top: 0;
  }

  .q-card.open .q-options { display: block; }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 14px;
  }

  @media (max-width: 600px) {
    .options-grid { grid-template-columns: 1fr; }
    h1 { font-size: 16px; }
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 14px;
    line-height: 1.5;
  }

  .option:hover { border-color: var(--muted); background: var(--bg); }

  .option.correct {
    border-color: var(--accent2);
    background: rgba(63,185,80,0.08);
  }

  .option.wrong {
    border-color: #f85149;
    background: rgba(248,81,73,0.06);
    opacity: 0.6;
  }

  .opt-letter {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    min-width: 22px;
    height: 22px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .option.correct .opt-letter { background: var(--accent2); border-color: var(--accent2); color: #000; }
  .option.wrong .opt-letter { background: #f85149; border-color: #f85149; color: #fff; }

  .answer-line {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(63,185,80,0.06);
    border: 1px solid rgba(63,185,80,0.25);
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
  }

  /* Short answer */
  .short-answer {
    margin-top: 14px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: 6px;
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
    line-height: 1.6;
  }

  .short-answer strong { color: var(--accent2); font-style: normal; }

  /* EMPTY STATE */
  #emptyState {
    display: none;
    text-align: center;
    padding: 64px 24px;
  }

  #emptyState .icon { font-size: 48px; margin-bottom: 16px; }
  #emptyState p { color: var(--muted); font-size: 15px; }

  /* SCROLL TOP */
  #scrollTop {
    position: fixed;
    bottom: 28px;
    right: 24px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50%;
    width: 44px;
    height: 44px;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(240,165,0,0.3);
    transition: opacity 0.2s;
  }
  #scrollTop:hover { opacity: 0.85; }
</style>
</head>

// ── Render ──────────────────────────────────────────────────────────
let activeFilter = "all";

function highlight(text, term) {
  if (!term) return escHtml(text);
  const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escHtml(text).replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function letterLabel(i) { return String.fromCharCode(65+i); }

function renderCard(q, term) {
  const hl = (t) => highlight(t, term);
  if (q.type === "mcq") {
    const optHtml = q.opts.map((o, i) => `
      <div class="option ${i === q.ans ? 'correct' : 'wrong'}" data-letter="${letterLabel(i)}">
        <span class="opt-letter">${letterLabel(i)}</span>
        <span>${hl(o)}</span>
      </div>`).join('');
    return `
    <div class="q-card" id="qc-${q.id}">
      <div class="q-header" onclick="toggleCard(${q.id})">
        <span class="q-num">Q${q.id}</span>
        <span class="q-text">${hl(q.q)}</span>
        <span class="q-toggle">+</span>
      </div>
      <div class="q-options">
        <div class="options-grid">${optHtml}</div>
        <div class="answer-line">✓ Correct answer: ${letterLabel(q.ans)}. ${escHtml(q.opts[q.ans])}</div>
      </div>
    </div>`;
  } else {
    return `
    <div class="q-card" id="qc-${q.id}">
      <div class="q-header" onclick="toggleCard(${q.id})">
        <span class="q-num">Q${q.id}</span>
        <span class="q-text">${hl(q.q)}</span>
        <span class="q-toggle">+</span>
      </div>
      <div class="q-options">
        <div class="short-answer"><strong>Answer:</strong><br>${escHtml(q.answer)}</div>
      </div>
    </div>`;
  }
}

function render() {
  const term = document.getElementById('searchInput').value.trim().toLowerCase();
  const list = document.getElementById('questionList');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('resultCount');

  const filtered = QUESTIONS.filter(q => {
    const matchFilter =
      activeFilter === "all" ||
      (activeFilter === "2019" && q.session === "2019") ||
      (activeFilter === "2020" && q.session === "2020") ||
      (activeFilter === "mcq" && q.type === "mcq") ||
      (activeFilter === "short" && q.type === "short");
    if (!matchFilter) return false;
    if (!term) return true;
    const searchable = [q.q, ...(q.opts||[]), q.answer||''].join(' ').toLowerCase();
    return searchable.includes(term);
  });

  // Clear cards (keep emptyState)
  Array.from(list.querySelectorAll('.q-card, .section-divider')).forEach(e => e.remove());

  if (filtered.length === 0) {
    empty.style.display = 'block';
    count.textContent = '0';
    return;
  }
  empty.style.display = 'none';
  count.textContent = filtered.length;

  // Group by session
  const sess19 = filtered.filter(q => q.session === "2019");
  const sess20 = filtered.filter(q => q.session === "2020");

  let html = '';
  if (sess19.length) {
    html += `<div class="section-divider"><h2>Session</h2><div class="divider-line"></div><span class="session-badge">2019/2020</span></div>`;
    html += sess19.map(q => renderCard(q, term)).join('');
  }
  if (sess20.length) {
    html += `<div class="section-divider"><h2>Session</h2><div class="divider-line"></div><span class="session-badge">2020/2021</span></div>`;
    html += sess20.map(q => renderCard(q, term)).join('');
  }
  list.insertAdjacentHTML('beforeend', html);
}

function toggleCard(id) {
  const card = document.getElementById(`qc-${id}`);
  card.classList.toggle('open');
}

// Search
const input = document.getElementById('searchInput');
const clearBtn = document.getElementById('clearBtn');
input.addEventListener('input', () => {
  clearBtn.style.display = input.value ? 'flex' : 'none';
  render();
});
clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.style.display = 'none';
  render();
  input.focus();
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

// Scroll top
const scrollBtn = document.getElementById('scrollTop');
window.addEventListener('scroll', () => {
  scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
});
scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// Init
render();
</script>
