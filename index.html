                                    <span className={`shrink-0 w-8 h-8 rounded-full border border-slate-200 flex items-center justify-center transition-transform duration-300 ${openIdx === i ? 'rotate-180 bg-blue-50 border-blue-200' : ''}`}>
                                        <i data-lucide="chevron-down" className={`w-4 h-4 ${openIdx === i ? 'text-blue-600' : 'text-slate-400'}`}></i>
                                    </span>
                                </button>
                                {openIdx === i && (
                                    <div className="px-6 sm:px-8 pb-6 sm:pb-8 animate-fade-in">
                                        <p className="text-slate-600 leading-relaxed text-sm sm:text-base pl-0 sm:pl-12">{faq.a}</p>
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                );
            };


            // ── MATCH DETAIL MODAL (App-level, renders outside page scroll) ──────
            const MatchDetailModal = ({ matchData, onClose, addToCart }) => {
                const { match, matchIdx } = matchData;
                const homeCountry = COUNTRIES[match.home];
                const awayCountry = COUNTRIES[match.away];
                const stadium = STADIUMS[match.stadium];
                const label = match.label || match.group;

                // Self-contained qty state so the modal is fully independent
                const [qtys, setQtys] = useState({});

                const getQty = (catIdx) => qtys[catIdx] !== undefined ? qtys[catIdx] : 1;
                const updateQty = (catIdx, val, max) => {
                    let v = parseInt(val);
                    if (isNaN(v)) v = 1;
                    if (v < 1) v = 1;
                    if (v > max) v = max;
                    setQtys(prev => ({ ...prev, [catIdx]: v }));
                };

                const tickets = ticketTypes.map((t, catIdx) => {
                    const stock = getStockForMatch(matchIdx, catIdx);
                    const stockInfo = getStockLabel(stock);
                    let multiplier = 1;
                    if (HOWMANYMATCHES === 21) multiplier = 1.8;
                    if (HOWMANYMATCHES === 22) multiplier = 2.2;
                    if (HOWMANYMATCHES === 23) multiplier = 1.5;
                    if (HOWMANYMATCHES === 24) multiplier = 3;
                    if (HOWMANYMATCHES === 25) multiplier = 2.5;
                    return { ...t, price: Math.round(t.basePrice * multiplier), stock, stockInfo };
                });

                useEffect(() => { if(typeof lucide !== "undefined") lucide.createIcons(); });

                return (
                    <div className="fixed inset-0 z-[190] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4 sm:p-6">
                        <div className="bg-white w-full rounded-2xl shadow-2xl animate-fade-in relative flex flex-col" style={{maxWidth: "min(480px, calc(100vw - 32px))", maxHeight: "min(720px, calc(100dvh - 32px))"}}>
                            <button onClick={onClose} className="absolute top-4 right-4 text-slate-400 hover:text-slate-900 transition-colors z-20 bg-white rounded-full w-8 h-8 flex items-center justify-center shadow-sm border border-slate-100">
                                <i data-lucide="x" className="w-4 h-4"></i>
                            </button>

                            {/* Modal header — pinned, never scrolls */}
                            <div className="bg-gradient-to-br from-blue-950 to-blue-800 p-5 sm:p-6 pr-14 text-white flex-shrink-0 rounded-t-[2rem]">
                                <div className="inline-block px-3 py-1 bg-blue-600/50 text-[10px] font-black uppercase tracking-[0.3em] rounded-full mb-3">{label}</div>
                                <div className="flex items-center justify-between gap-3">
                                    <div className="flex flex-col items-center gap-1.5 flex-1">
                                        <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-full overflow-hidden border-2 border-white/30 shadow-xl bg-white/10 flex items-center justify-center">
                                            <img src={`https://flagcdn.com/w80/${homeCountry?.flag}.png`} alt={homeCountry?.name} className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; e.target.parentNode.innerHTML = `<span class='font-black text-sm text-white'>${homeCountry?.shortName || '?'}</span>`; }} />
                                        </div>
                                        <p className="font-black text-sm uppercase">{homeCountry?.shortName}</p>
                                        <p className="text-blue-200 text-[9px] font-medium text-center leading-tight">{homeCountry?.name}</p>
                                    </div>
                                    <div className="text-xl font-black italic text-white/30 shrink-0">VS</div>
                                    <div className="flex flex-col items-center gap-1.5 flex-1">
                                        <div className="w-12 h-12 sm:w-14 sm:h-14 rounded-full overflow-hidden border-2 border-white/30 shadow-xl bg-white/10 flex items-center justify-center">
                                            <img src={`https://flagcdn.com/w80/${awayCountry?.flag}.png`} alt={awayCountry?.name} className="w-full h-full object-cover" onError={(e) => { e.target.style.display='none'; e.target.parentNode.innerHTML = `<span class='font-black text-sm text-white'>${awayCountry?.shortName || '?'}</span>`; }} />
                                        </div>
                                        <p className="font-black text-sm uppercase">{awayCountry?.shortName}</p>
                                        <p className="text-blue-200 text-[9px] font-medium text-center leading-tight">{awayCountry?.name}</p>
                                    </div>
                                </div>
                                <div className="mt-4 grid grid-cols-2 gap-2">
                                    <div className="bg-white/10 rounded-xl p-3">
                                        <p className="text-blue-300 text-[9px] font-black uppercase tracking-widest mb-0.5">Stadium</p>
                                        <p className="font-bold text-xs leading-tight">{stadium?.name}</p>
                                        <p className="text-blue-200 text-[10px]">{stadium?.city}, {stadium?.country}</p>
                                        <p className="text-blue-300 text-[9px] mt-0.5">Cap: {stadium?.capacity}</p>
                                    </div>
                                    <div className="bg-white/10 rounded-xl p-3">
                                        <p className="text-blue-300 text-[9px] font-black uppercase tracking-widest mb-0.5">Date & Time</p>
                                        <p className="font-bold text-xs">{match.date}</p>
                                        <p className="text-blue-200 text-[10px]">{match.time}</p>
                                    </div>
                                </div>
                            </div>

                            {/* Ticket list — only this area scrolls inside the static modal */}
                            <div className="flex-1 overflow-y-auto p-4 sm:p-6 space-y-3 rounded-b-[2rem] scrollbar-hidden">
                                <h3 className="text-base font-black uppercase italic tracking-tighter">Available Tickets</h3>
                                {tickets.map((t, catIdx) => (
                                    <div key={catIdx} className="group p-4 border border-slate-100 rounded-2xl hover:border-blue-400 hover:bg-blue-50/20 transition-all">
                                        <div className="flex items-start gap-3 mb-3">
                                            <div className={`w-1.5 h-10 rounded-full shrink-0 mt-0.5 ${t.color}`}></div>
                                            <div className="flex-1 min-w-0">
                                                <div className="flex flex-wrap items-center gap-2 mb-0.5">
                                                    <h4 className="text-sm font-black italic uppercase tracking-tighter">{t.cat}</h4>
                                                    <span className={`px-2 py-0.5 text-[10px] font-black uppercase rounded ${t.stockInfo.color}`}>{t.stockInfo.label}</span>
                                                </div>
                                                <p className="text-slate-500 text-xs leading-snug">{t.desc}</p>
                                            </div>
                                            <div className="text-right shrink-0">
                                                <p className="text-lg font-black italic tracking-tighter">${t.price.toLocaleString()}</p>
                                                <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">per ticket</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-3 pl-4">
                                            <div className="flex items-center bg-slate-100 p-1 rounded-xl border border-slate-200">
                                                <button onClick={() => updateQty(catIdx, getQty(catIdx) - 1, t.stock)} className="w-7 h-7 flex items-center justify-center font-black text-sm">-</button>
                                                <input type="number" className="w-9 bg-transparent text-center font-black focus:outline-none text-sm" value={getQty(catIdx)} onChange={(e) => updateQty(catIdx, e.target.value, t.stock)} />
                                                <button onClick={() => updateQty(catIdx, getQty(catIdx) + 1, t.stock)} className="w-7 h-7 flex items-center justify-center font-black text-sm">+</button>
                                            </div>
                                            <button
                                                onClick={() => {
                                                    addToCart({ cat: `${homeCountry?.shortName} vs ${awayCountry?.shortName} — ${t.cat}`, price: t.price }, getQty(catIdx));
                                                }}
                                                className="flex-1 py-2.5 bg-slate-950 text-white font-black rounded-xl hover:bg-blue-600 transition-all text-[10px] uppercase tracking-widest text-center"
                                            >
                                                Add to Cart
                                            </button>
                                        </div>
                                    </div>
                                ))}
                                <p className="text-center text-[10px] font-bold text-slate-400 uppercase tracking-[0.15em] pt-1 pb-2">
                                    Prices fluctuate based on market demand. All sales verified by Tiketify HQ.
                                </p>
                            </div>
                        </div>
                    </div>
                );
            };

            // ── WORLD CUP PAGE ────────────────────────────────────────────────
            const WorldCupPage = ({ onSelectMatch, wcSubPage, setWcSubPage }) => {
                const [matchQtys, setMatchQtys] = useState({});

                useEffect(() => {
                    if(typeof lucide !== "undefined") lucide.createIcons();
                }, [wcSubPage, matchQtys]);

                // Determine which matches to show based on HOWMANYMATCHES
                const getMatchesToShow = () => {
                    if (HOWMANYMATCHES >= 1 && HOWMANYMATCHES <= 20) {
                        return { matches: MATCHES.slice(0, HOWMANYMATCHES), stageLabel: "Group Stage Matches" };
                    }
                    if (HOWMANYMATCHES === 21) return { matches: QUARTER_FINALS, stageLabel: "Quarter Finals" };
                    if (HOWMANYMATCHES === 22) return { matches: SEMI_FINALS, stageLabel: "Semi Finals" };
                    if (HOWMANYMATCHES === 23) return { matches: THIRD_PLACE, stageLabel: "Third Place Match" };
                    if (HOWMANYMATCHES === 24) return { matches: FINAL_MATCH, stageLabel: "THE FINAL" };
                    if (HOWMANYMATCHES === 25) return { matches: [...THIRD_PLACE, ...FINAL_MATCH], stageLabel: "3rd Place & The Final" };
                    return { matches: MATCHES.slice(0, 20), stageLabel: "Group Stage Matches" };
                };

                const { matches: displayMatches, stageLabel } = getMatchesToShow();

                const getFlagUrl = (countryCode) => {
                    const country = COUNTRIES[countryCode];
                    if (!country) return '';
                    return `https://flagcdn.com/w80/${country.flag}.png`;
                };

                const getTicketsForMatch = (matchIdx) => {
                    return ticketTypes.map((t, catIdx) => {
                        const stock = getStockForMatch(matchIdx, catIdx);
                        const stockInfo = getStockLabel(stock);
                        // Price multiplier for knockout rounds
                        let multiplier = 1;
                        if (HOWMANYMATCHES === 21) multiplier = 1.8;
                        if (HOWMANYMATCHES === 22) multiplier = 2.2;
                        if (HOWMANYMATCHES === 23) multiplier = 1.5;
                        if (HOWMANYMATCHES === 24) multiplier = 3;
                        if (HOWMANYMATCHES === 25) multiplier = 2.5;
                        return {
                            ...t,
                            price: Math.round(t.basePrice * multiplier),
                            stock,
                            stockInfo,
                        };
                    });
                };

                // ── Match Card component ─────────────────────────────────────
                const MatchCard = ({ match, matchIdx }) => {
                    const homeCountry = COUNTRIES[match.home];
                    const awayCountry = COUNTRIES[match.away];
                    const stadium = STADIUMS[match.stadium];
                    const notif = getPopupNotif(match.POPUP_NOTIF);
                    const isExpired = match.MATCHSTATE === 1;
                    const label = match.label || match.group;

                    return (
                        <div
                            className={`relative bg-white border border-slate-100 rounded-[2rem] shadow-sm overflow-hidden transition-all ${isExpired ? 'cursor-not-allowed' : 'hover:shadow-xl hover:border-blue-200 cursor-pointer'}`}
                            onClick={() => { if (!isExpired) onSelectMatch({ match, matchIdx }); }}
                        >
                            {/* Expired overlay */}
                            {isExpired && (
                                <div className="expired-overlay">
                                    <div className="expired-stamp">EXPIRED</div>
                                </div>
                            )}

                            <div className="p-6">
                                {/* Header row */}
                                <div className="flex items-center justify-between mb-5">
                                    <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 bg-slate-100 px-3 py-1 rounded-full">{label}</span>
                                    {notif && (
                                        <span className={`text-[10px] font-black uppercase tracking-wider px-3 py-1 rounded-full ${notif.color}`}>
                                            {notif.label}
                                        </span>
                                    )}
                                </div>

                                {/* Teams */}
                                <div className="flex items-center justify-between gap-4">
                                    {/* Home team */}
                                    <div className="flex flex-col items-center gap-2 flex-1">
                                        <div className="w-14 h-14 rounded-full overflow-hidden border-2 border-slate-100 shadow-md bg-slate-50 flex items-center justify-center">
                                            <img
                                                src={getFlagUrl(match.home)}
                                                alt={homeCountry?.name}
                                                className="w-full h-full object-cover"
                                                onError={(e) => { e.target.style.display='none'; e.target.parentNode.innerHTML = `<span class="font-black text-xs">${homeCountry?.shortName || '?'}</span>`; }}
                                            />
                                        </div>
                                        <p className="text-xs font-black uppercase tracking-tight text-center">{homeCountry?.shortName || '???'}</p>
                                        <p className="text-[9px] text-slate-400 font-medium text-center leading-tight">{homeCountry?.name || '???'}</p>
                                    </div>

                                    {/* VS */}
                                    <div className="flex flex-col items-center gap-1">
                                        <span className="text-2xl font-black italic text-slate-200">VS</span>
                                    </div>

                                    {/* Away team */}
                                    <div className="flex flex-col items-center gap-2 flex-1">
                                        <div className="w-14 h-14 rounded-full overflow-hidden border-2 border-slate-100 shadow-md bg-slate-50 flex items-center justify-center">
                                            <img
                                                src={getFlagUrl(match.away)}
                                                alt={awayCountry?.name}
                                                className="w-full h-full object-cover"
                                                onError={(e) => { e.target.style.display='none'; e.target.parentNode.innerHTML = `<span class="font-black text-xs">${awayCountry?.shortName || '?'}</span>`; }}
                                            />
                                        </div>
                                        <p className="text-xs font-black uppercase tracking-tight text-center">{awayCountry?.shortName || '???'}</p>
                                        <p className="text-[9px] text-slate-400 font-medium text-center leading-tight">{awayCountry?.name || '???'}</p>
                                    </div>
                                </div>

                                {/* Match info */}
                                <div className="mt-5 pt-5 border-t border-slate-100 space-y-2">
                                    <div className="flex items-center gap-2 text-xs text-slate-500">
                                        <i data-lucide="map-pin" className="w-3 h-3 text-blue-500 shrink-0"></i>
                                        <span className="font-semibold truncate">{stadium?.name}, {stadium?.city}</span>
                                    </div>
                                    <div className="flex items-center gap-2 text-xs text-slate-500">
                                        <i data-lucide="calendar" className="w-3 h-3 text-blue-500 shrink-0"></i>
                                        <span className="font-semibold">{match.date} · {match.time}</span>
                                    </div>
                                </div>

                                {/* CTA */}
                                {!isExpired && (
                                    <div className="mt-5">
                                        <div className="w-full py-3 bg-slate-950 text-white rounded-xl font-black text-[11px] uppercase tracking-widest text-center hover:bg-blue-600 transition-all">
                                            View Tickets
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="animate-fade-in bg-slate-50 min-h-screen">
                        {/* Hero */}
                        <header className="relative bg-blue-950 overflow-hidden" style={{paddingTop: '8rem', paddingBottom: '4rem'}}>
                            <img
                                src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&q=80&w=2000"
                                className="absolute inset-0 opacity-30 object-cover w-full h-full scale-105"
                                alt="World Cup 2026"
                                style={{objectPosition: 'center center'}}
                            />
                            <div className="absolute inset-0 bg-gradient-to-r from-blue-950 via-blue-950/70 to-transparent"></div>
                            <div className="relative w-full max-w-7xl mx-auto px-5 sm:px-6 lg:px-8">
                                <div className="inline-flex items-center bg-amber-400/20 border border-amber-400/40 text-amber-300 px-4 py-2 rounded-full text-[10px] font-black tracking-[0.3em] uppercase mb-5">
                                    <i data-lucide="trophy" className="w-4 h-4 mr-2 shrink-0"></i> FIFA WORLD CUP 2026
                                </div>
                                <h1 className="text-4xl sm:text-6xl md:text-8xl font-black text-white italic tracking-tighter uppercase leading-[1] mb-4">
                                    THE WORLD <br/><span className="text-amber-400">CUP 2026</span>
                                </h1>
                                <p className="text-sm sm:text-base md:text-lg text-blue-200 font-medium max-w-xl mb-6 leading-relaxed">48 nations. 3 host countries. 104 matches. The greatest sporting event on earth returns to North America.</p>
                                <div className="flex flex-col sm:flex-row flex-wrap gap-2 sm:gap-5 text-white font-bold text-xs sm:text-sm">
                                    <div className="flex items-center"><i data-lucide="map-pin" className="mr-2 text-amber-400 w-3.5 h-3.5 shrink-0"></i> USA · Canada · Mexico</div>
                                    <div className="flex items-center"><i data-lucide="calendar" className="mr-2 text-amber-400 w-3.5 h-3.5 shrink-0"></i> June 11 — July 19, 2026</div>
                                    <div className="flex items-center"><i data-lucide="users" className="mr-2 text-amber-400 w-3.5 h-3.5 shrink-0"></i> 48 Teams · 104 Matches</div>
                                </div>
                            </div>
                        </header>

                        {/* Sub-navigation */}
                        <div className="sticky top-20 z-40 bg-white border-b border-slate-200 shadow-sm">
                            <div className="max-w-7xl mx-auto px-4">
                                <div className="flex gap-0 overflow-x-auto">
                                    {[
                                        { key: 'overview', label: 'Overview' },
                                        { key: 'matches', label: 'Matches & Tickets' },
                                        { key: 'venues', label: 'Venues' },
                                    ].map(tab => (
                                        <button
                                            key={tab.key}
                                            onClick={() => setWcSubPage(tab.key)}
                                            className={`px-8 py-5 text-xs font-black uppercase tracking-widest border-b-2 transition-all whitespace-nowrap ${wcSubPage === tab.key ? 'border-blue-600 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-700'}`}
                                        >
                                            {tab.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* Sub-page content */}
                        <div className="max-w-7xl mx-auto px-4 py-16">

                            {/* ── OVERVIEW ─────────────────────────────────── */}
                            {wcSubPage === 'overview' && (
                                <div className="space-y-16 animate-fade-in">
                                    {/* Stats */}
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                        {[
                                            { val: "48", label: "Competing Nations" },
                                            { val: "104", label: "Total Matches" },
                                            { val: "16", label: "Host Venues" },
                                            { val: "3", label: "Host Countries" },
                                        ].map((s, i) => (
                                            <div key={i} className="bg-white rounded-[2rem] p-8 border border-slate-100 text-center shadow-sm">
                                                <p className="text-5xl font-black text-blue-600 italic tracking-tighter">{s.val}</p>
                                                <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">{s.label}</p>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Host countries */}
                                    <div>
                                        <h2 className="text-3xl font-black uppercase italic tracking-tighter mb-8">Host <span className="text-blue-600">Countries</span></h2>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                            {[
                                                { code: 1, venues: "11 venues", color: "from-red-900 to-blue-900", img: "https://images.unsplash.com/photo-1485738422979-f5c462d49f74?auto=format&fit=crop&q=80&w=800" },
                                                { code: 2, venues: "2 venues", color: "from-red-800 to-slate-900", img: "https://images.unsplash.com/photo-1508193638397-1c4234db14d8?auto=format&fit=crop&q=80&w=800" },
                                                { code: 3, venues: "3 venues", color: "from-green-900 to-red-900", img: "https://images.unsplash.com/photo-1518638150340-f706e86654de?auto=format&fit=crop&q=80&w=800" },
                                            ].map((h, i) => {
                                                const country = COUNTRIES[h.code];
                                                return (
                                                    <div key={i} className="relative h-72 rounded-[2rem] overflow-hidden shadow-xl group">
                                                        <img src={h.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" alt={country.name} />
                                                        <div className={`absolute inset-0 bg-gradient-to-t ${h.color} opacity-60`}></div>
                                                        <div className="absolute inset-0 flex flex-col justify-end p-8">
                                                            <div className="flex items-center gap-3 mb-2">
                                                                <img src={`https://flagcdn.com/w40/${country.flag}.png`} className="h-5 rounded-sm shadow" alt={country.name} />
                                                                <h3 className="text-2xl font-black text-white uppercase italic tracking-tighter">{country.name}</h3>
                                                            </div>
                                                            <p className="text-white/70 text-sm font-bold">{h.venues}</p>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* Tiketify protection box */}
                                    <div className="bg-blue-600 p-6 sm:p-10 md:p-12 rounded-[2.5rem] text-white shadow-2xl shadow-blue-600/30">
                                        <div className="grid md:grid-cols-2 gap-10 items-center">
                                            <div>
                                                <h3 className="text-3xl font-black italic uppercase tracking-tighter mb-4">Tiketify World Cup Protection</h3>
                                                <p className="text-blue-100 text-lg leading-relaxed">Every World Cup ticket sold through TIKETIFY is covered by our elite Buyer Shield. From group stage to the Final, your seat is guaranteed.</p>
                                            </div>
                                            <ul className="space-y-4">
                                                {["100% Authentic Ticket Guarantee", "On-Time Mobile Delivery", "Full Refund on Disruption", "24/7 Dedicated Support Line", "Group Booking Concierge Available"].map((item, i) => (
                                                    <li key={i} className="flex items-center font-bold text-sm">
                                                        <i data-lucide="check-circle-2" className="mr-3 w-5 h-5 shrink-0"></i> {item}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>

                                    <div className="text-center">
                                        <button onClick={() => setWcSubPage('matches')} className="px-12 py-5 bg-slate-950 text-white rounded-2xl font-black text-lg uppercase tracking-widest hover:bg-blue-600 transition-all shadow-xl">
                                            Browse All Matches & Tickets →
                                        </button>
                                    </div>
                                </div>
                            )}

                            {/* ── MATCHES ──────────────────────────────────── */}
                            {wcSubPage === 'matches' && (
                                <div className="animate-fade-in">
                                    <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
                                        <div>
                                            <h2 className="text-3xl font-black uppercase italic tracking-tighter">{stageLabel}</h2>
                                            <p className="text-slate-500 text-sm mt-1">Showing {displayMatches.length} match{displayMatches.length !== 1 ? 'es' : ''}. Click a match to view tickets.</p>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="w-3 h-3 bg-red-500 rounded-full"></span><span className="text-xs font-bold text-slate-500">Hot 🔥</span>
                                            <span className="w-3 h-3 bg-purple-500 rounded-full ml-3"></span><span className="text-xs font-bold text-slate-500">Trending 📈</span>
                                            <span className="w-3 h-3 bg-orange-500 rounded-full ml-3"></span><span className="text-xs font-bold text-slate-500">Selling Fast ⚡</span>
                                        </div>
                                    </div>

                                {cart.length === 0 ? (
                                    <div className="text-center py-20 opacity-30">
                                        <i data-lucide="shopping-cart" className="w-16 h-16 mx-auto mb-4"></i>
                                        <p className="font-bold uppercase tracking-widest text-xs">Cart is empty</p>
                                    </div>
                                ) : (
                                    cart.map((item, i) => (
                                        <div key={i} className="flex justify-between items-center bg-slate-50 p-6 rounded-[1.5rem] border border-slate-100">
                                            <div>
                                                <p className="font-black uppercase italic text-sm">{item.cat}</p>
                                                <p className="text-xs font-bold text-slate-400">{item.quantity} x ${item.price.toLocaleString()}</p>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <p className="font-black text-blue-600">${(item.price * item.quantity).toLocaleString()}</p>
                                                <button onClick={() => setCart(cart.filter(x => x.cat !== item.cat))} className="text-red-400 hover:text-red-600"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>

                            {cart.length > 0 && (
                                <div className="p-8 border-t bg-slate-50 space-y-5">
                                    {/* Promo Code Input */}
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Promo Code</p>
                                        <div className="flex gap-2">
                                            <input
                                                type="text"
                                                value={promoCode}
                                                onChange={(e) => {
                                                    setPromoCode(e.target.value);
                                                    setPromoError('');
                                                    if (promoApplied) setPromoApplied(false);
                                                }}
                                                onKeyDown={handlePromoKeyDown}
                                                placeholder="Enter promo code"
                                                className={`flex-1 px-4 py-3 bg-white border rounded-xl text-sm font-bold outline-none transition-all focus:ring-2 ${promoApplied ? 'border-green-400 focus:ring-green-400 text-green-700' : promoError ? 'border-red-300 focus:ring-red-300' : 'border-slate-200 focus:ring-blue-400'}`}
                                            />
                                            <button
                                                onClick={handleApplyPromo}
                                                className="px-5 py-3 bg-slate-900 text-white rounded-xl font-black text-xs uppercase tracking-widest hover:bg-blue-600 transition-all"
                                            >
                                                Apply
                                            </button>
                                        </div>
                                        {promoApplied && (
                                            <div className="flex items-center gap-2 text-green-600">
                                                <i data-lucide="check-circle-2" className="w-4 h-4"></i>
                                                <p className="text-xs font-black uppercase tracking-wide">{promoLabel}</p>
                                            </div>
                                        )}
                                        {promoError && (
                                            <div className="flex items-center gap-2 text-red-500">
                                                <i data-lucide="alert-circle" className="w-4 h-4"></i>
                                                <p className="text-xs font-bold">{promoError}</p>
                                            </div>
                                        )}
                                    </div>

                                    {/* Totals */}
                                    <div className="space-y-2">
                                        {promoApplied && (
                                            <>
                                                <div className="flex justify-between items-center">
                                                    <p className="font-black uppercase tracking-widest text-xs text-slate-400">Original Price</p>
                                                    <p className="text-lg font-black text-slate-400 line-through">${cartTotal.toLocaleString()}</p>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <p className="font-black uppercase tracking-widest text-xs text-green-600">You Save ({Math.round(promoDiscount * 100)}%)</p>
                                                    <p className="text-lg font-black text-green-600">−${savings.toLocaleString()}</p>
                                                </div>
                                            </>
                                        )}
                                        <div className="flex justify-between items-center pt-1">
                                            <p className="font-black uppercase tracking-widest text-xs text-slate-400">Grand Total</p>
                                            <p className="text-2xl font-black italic">${discountedTotal.toLocaleString()}</p>
                                        </div>
                                    </div>

                                    <button
                                        onClick={() => {
                                            setIsCartOpen(false);
                                            setSelectedTicket({ cat: 'Full Cart Order', price: discountedTotal });
                                        }}
                                        className="w-full py-5 bg-blue-600 text-white rounded-2xl font-black uppercase tracking-widest text-lg shadow-xl shadow-blue-600/20"
                                    >
                                        Proceed to Checkout
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            // ── ROOT RENDER ───────────────────────────────────────────────────
            return (
                <div className="min-h-screen flex flex-col selection:bg-blue-100 selection:text-blue-900 relative">
                    <Navbar />

                    <div className={`fixed top-24 right-4 z-[300] bg-white border border-blue-100 shadow-2xl p-6 rounded-[2rem] transition-all duration-500 transform ${showNotification ? 'translate-x-0 opacity-100' : 'translate-x-10 opacity-0 pointer-events-none'} flex items-center gap-4`}>
                        <div className="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center">
                            <i data-lucide="check" className="text-green-600 w-5 h-5"></i>
                        </div>
                        <div>
                            <p className="font-black uppercase tracking-tight text-xs">Item Added to Cart</p>
                            <button onClick={() => { setIsCartOpen(true); setSelectedMatch(null); setShowNotification(false); }} className="text-blue-600 font-black text-[10px] uppercase tracking-widest mt-1 hover:underline">View Cart & Checkout →</button>
                        </div>
                        <button onClick={() => setShowNotification(false)} className="ml-4 opacity-30 hover:opacity-100"><i data-lucide="x" className="w-4 h-4"></i></button>
                    </div>

                    <main className="flex-grow pt-20">
                        {activePage === 'home' && <HomePage />}
                        {activePage === 'worldcup-2026' && <WorldCupPage onSelectMatch={setSelectedMatch} wcSubPage={wcSubPage} setWcSubPage={setWcSubPage} />}
                        {activePage === 'champions-league' && <ChampionsLeaguePage />}
                    </main>

                    <Footer />

                    <CartDrawer />
                    {selectedMatch && (
                        <MatchDetailModal matchData={selectedMatch} onClose={() => setSelectedMatch(null)} addToCart={addToCart} />
                    )}
                    {selectedTicket && (
                        <CheckoutModal
                            ticket={selectedTicket}
                            onClose={() => setSelectedTicket(null)}
                            cart={cart}
                            cartTotal={cartTotal}
                        />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
